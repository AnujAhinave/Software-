<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clinic Pro Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { background: #ffffff; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
    .nav-active { color: #3b82f6; border-top: 3px solid #3b82f6; }
    .row-item { border-bottom: 1px solid #f8f8f8; }
    .time-pill { background: #f1f5f9; font-weight: 700; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .slot-card { border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; position: relative; }
    .is-available { background: #f0fdf4; color: #166534; }
    .is-blocked { background: #1e293b; color: white; }
    .is-booked { background: #eff6ff; color: #1e40af; opacity: 0.6; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <nav class="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-50">
    <h1 id="page-title" class="text-sm font-800 italic uppercase">Patients</h1>
    <div class="flex gap-4">
       <button onclick="showSmartPasteMenu()" class="text-blue-500 font-bold text-[10px] uppercase">Smart Paste</button>
       <button onclick="location.reload()" class="text-gray-400">🔄</button>
    </div>
  </nav>

  <div id="view-ledger" class="p-4">
    <input type="text" id="searchBox" onkeyup="filterLedger(this.value)" placeholder="Search name..." class="w-full mb-4 p-2 border rounded-lg text-sm">
    <div id="ledger-content" class="space-y-4">
        <p class="text-center text-gray-400 py-10 text-xs uppercase font-bold">Loading Patients...</p>
    </div>
  </div>

  <div id="view-schedule" class="p-4 hidden">
    <div id="schedule-content" class="space-y-6">
        <p class="text-center text-gray-400 py-10 text-xs uppercase font-bold">Loading Calendar...</p>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white border-t flex justify-around items-center h-16 z-50">
    <button onclick="switchView('ledger')" id="btn-ledger" class="flex flex-col items-center gap-1 w-full pt-2 nav-active">
      <span class="text-[10px] font-bold uppercase">Patients</span>
    </button>
    <button onclick="switchView('schedule')" id="btn-schedule" class="flex flex-col items-center gap-1 w-full pt-2 text-gray-400">
      <span class="text-[10px] font-bold uppercase">Calendar</span>
    </button>
  </div>

  <script>
    // --- CONFIGURATION ---
    const API_URL = "PASTE_YOUR_GOOGLE_WEB_APP_URL_HERE"; 
    let globalLedger = [];
    let globalSchedule = [];
    let clipboardPattern = [];

    // --- DATA LOADING (FETCH FROM GOOGLE) ---
    async function loadAllData() {
        try {
            const resLedger = await fetch(`${API_URL}?action=getAppointments`);
            globalLedger = await resLedger.json();
            renderLedger(globalLedger);

            const resSched = await fetch(`${API_URL}?action=getMasterSchedule`);
            globalSchedule = await resSched.json();
            renderSchedule(globalSchedule);
        } catch (e) {
            console.error("Connection failed. Check your API URL and Permissions.");
        }
    }

    // --- RENDER PATIENT LEDGER ---
    function renderLedger(data) {
      const container = document.getElementById('ledger-content');
      container.innerHTML = data.map(item => `
        <div class="row-item pb-4">
          <div class="flex justify-between items-start">
            <div class="w-2/3">
              <p class="text-sm font-bold">${item['Name'] || 'No Name'}</p>
              <div class="flex gap-2 mt-1">
                <span class="time-pill">${item['Appt Time']}</span>
                <a href="tel:${item['Phone']}" class="text-[10px] font-extrabold text-blue-500 uppercase">Call</a>
                <a href="https://wa.me/91${item['Phone']}" class="text-[10px] font-extrabold text-green-500 uppercase">WA</a>
              </div>
            </div>
            <div class="flex flex-col items-end gap-2">
              <input type="checkbox" class="w-4 h-4 rounded">
              <button onclick="deleteAppt(${item.rowNumber}, '${item['Appt Date']}', '${item['Appt Time']}')" class="text-[9px] font-bold text-red-300 uppercase tracking-tighter">Del</button>
            </div>
          </div>
          <textarea onchange="saveNote(${item.rowNumber}, this.value)" class="w-full mt-2 text-xs text-gray-500 border-none p-0 focus:ring-0" placeholder="Notes...">${item['Description'] || ''}</textarea>
        </div>
      `).join('');
    }

    // --- RENDER SCHEDULER ---
    function renderSchedule(data) {
      const container = document.getElementById('schedule-content');
      const grouped = data.reduce((acc, curr) => { (acc[curr.date] = acc[curr.date] || []).push(curr); return acc; }, {});
      let html = '';
      for (const date in grouped) {
        const dayName = grouped[date][0].day || "";
        html += `
          <div class="flex justify-between items-center mt-6">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${date} (${dayName})</h2>
            <button onclick="dayMenu('${date}')" class="text-blue-500 font-bold text-[10px]">OPTIONS</button>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-2">
          ${grouped[date].map(s => `
            <div onclick="toggleSlot(${s.rowNumber}, '${s.status}')" class="slot-card ${s.status === 'Available' ? 'is-available' : s.status === 'Booked' ? 'is-booked' : 'is-blocked'}">
              <p class="text-xs font-bold">${s.time}</p>
              <p class="text-[8px] uppercase font-bold opacity-60">${s.status}</p>
            </div>
          `).join('')}</div>`;
      }
      container.innerHTML = html;
    }

    // --- UTILITIES ---
    function switchView(view) {
      document.getElementById('view-ledger').classList.toggle('hidden', view !== 'ledger');
      document.getElementById('view-schedule').classList.toggle('hidden', view !== 'schedule');
      document.getElementById('btn-ledger').classList.toggle('nav-active', view === 'ledger');
      document.getElementById('btn-schedule').classList.toggle('nav-active', view === 'schedule');
      document.getElementById('page-title').innerText = view === 'ledger' ? 'Patients' : 'Calendar';
    }

    function filterLedger(val) {
      const filtered = globalLedger.filter(i => i.Name.toLowerCase().includes(val.toLowerCase()));
      renderLedger(filtered);
    }

    async function saveNote(row, val) {
        await fetch(`${API_URL}?action=updateDescription&row=${row}&val=${encodeURIComponent(val)}`);
    }

    // START THE APP
    window.onload = loadAllData;

  </script>
</body>
</html>
